name: Docker

on:
  push:
    branches: [master, main]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

env:
  IMAGE_NAME: eviltester/apichallenges
  DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout API Challenges
        uses: actions/checkout@v4
        with:
          path: apichallenges

      - name: Checkout Thingifier dependency
        uses: actions/checkout@v4
        with:
          repository: eviltester/thingifier
          ref: master
          path: thingifier

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Install Thingifier dependency
        run: >
          mvn -B -f thingifier/pom.xml -pl ercoremodel,thingifier -am install
          -DskipTests
          -Dspotless.check.skip=true
          -Dcheckstyle.skip=true
          -Dpmd.skip=true

      - name: Build deployable jar
        run: mvn -B -f apichallenges/pom.xml -pl challenger -am package

      - name: Set Docker metadata
        id: meta
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            tag="${GITHUB_REF_NAME}"
          else
            tag="latest"
          fi
          echo "tag=${tag}" >> "${GITHUB_OUTPUT}"

      - name: Build Docker image
        run: >
          docker build
          -f apichallenges/docker/apichallenges/Dockerfile
          -t ${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.tag }}
          apichallenges

      - name: Smoke test Docker image
        run: |
          docker run --name apichallenges-smoke -d -p 4567:4567 ${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.tag }}
          trap 'docker logs apichallenges-smoke; docker rm -f apichallenges-smoke' EXIT
          for attempt in {1..30}; do
            if curl --fail --silent --output /dev/null http://localhost:4567/heartbeat; then
              break
            fi
            sleep 1
          done
          curl --fail --silent --output /dev/null http://localhost:4567/challenges
          curl --fail --silent --output /dev/null http://localhost:4567/docs

      - name: Log in to Docker Hub
        if: github.event_name != 'pull_request' && env.DOCKERHUB_USERNAME != ''
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Push Docker image
        if: github.event_name != 'pull_request' && env.DOCKERHUB_USERNAME != ''
        run: docker push ${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.tag }}
